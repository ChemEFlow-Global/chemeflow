<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#04060f"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c4ff"/>
      <stop offset="100%" stop-color="#4060ff"/>
    </linearGradient>
    <linearGradient id="gband" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00c4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00c4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowsm">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- grid -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#00c4ff" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="628" x2="1200" y2="628" stroke="#00c4ff" stroke-width="2" opacity="0.5"/>
  <rect x="0" y="0" width="1200" height="180" fill="url(#gband)"/>
  <!-- hex logo -->
  <g transform="translate(175,315)">
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55"
      fill="none" stroke="url(#g1)" stroke-width="3.5" opacity="0.55" filter="url(#glow)"/>
    <polygon points="0,-70 60,-35 60,35 0,70 -60,35 -60,-35"
      fill="none" stroke="#00c4ff" stroke-width="1.5" opacity="0.2"/>
    <circle cx="0" cy="-70" r="12" fill="#00c4ff" filter="url(#glowsm)"/>
    <circle cx="60" cy="35" r="12" fill="#4060ff" filter="url(#glowsm)"/>
    <circle cx="-60" cy="35" r="12" fill="#00c4ff" filter="url(#glowsm)"/>
    <line x1="0" y1="-58" x2="54" y2="27" stroke="#00c4ff" stroke-width="4.5" opacity="0.8" stroke-linecap="round"/>
    <line x1="0" y1="-58" x2="-54" y2="27" stroke="#00c4ff" stroke-width="4.5" opacity="0.8" stroke-linecap="round"/>
    <line x1="-58" y1="37" x2="58" y2="37" stroke="#4060ff" stroke-width="4.5" opacity="0.65" stroke-linecap="round"/>
    <path d="M 9 9 L 34 -4 L 30 14 Z" fill="#00ffb3" opacity="0.95"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#00c4ff" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="4" fill="#00c4ff" opacity="0.55"/>
  </g>
  <!-- brand name -->
  <text x="380" y="280" font-family="'Courier New',monospace" font-size="112" font-weight="700"
    letter-spacing="8" fill="#e8f4ff" filter="url(#glowsm)">Chem<tspan fill="#00c4ff">E</tspan>Flow</text>
  <!-- tagline -->
  <text x="382" y="336" font-family="'Courier New',monospace" font-size="22" font-weight="400"
    letter-spacing="7" fill="rgba(120,160,220,0.7)">ENGINEERING INTELLIGENCE PLATFORM</text>
  <!-- stats -->
  <g transform="translate(382,420)">
    <rect x="0" y="0" width="175" height="66" rx="3" fill="rgba(8,14,32,0.9)" stroke="rgba(0,196,255,0.2)" stroke-width="1"/>
    <rect x="0" y="0" width="175" height="2" fill="#00c4ff" opacity="0.6"/>
    <text x="87" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="28" font-weight="700" fill="#00c4ff">100+</text>
    <text x="87" y="52" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" letter-spacing="2.5" fill="rgba(100,140,200,0.7)">CALCULATORS</text>
    <rect x="195" y="0" width="175" height="66" rx="3" fill="rgba(8,14,32,0.9)" stroke="rgba(0,196,255,0.2)" stroke-width="1"/>
    <rect x="195" y="0" width="175" height="2" fill="#00ffb3" opacity="0.6"/>
    <text x="282" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="28" font-weight="700" fill="#00ffb3">5</text>
    <text x="282" y="52" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" letter-spacing="2.5" fill="rgba(100,140,200,0.7)">DISCIPLINES</text>
    <rect x="390" y="0" width="175" height="66" rx="3" fill="rgba(8,14,32,0.9)" stroke="rgba(0,196,255,0.2)" stroke-width="1"/>
    <rect x="390" y="0" width="175" height="2" fill="#00c4ff" opacity="0.6"/>
    <text x="477" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="28" font-weight="700" fill="#00c4ff">PWA</text>
    <text x="477" y="52" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" letter-spacing="2.5" fill="rgba(100,140,200,0.7)">OFFLINE READY</text>
  </g>
  <!-- url -->
  <text x="382" y="570" font-family="'Courier New',monospace" font-size="18" letter-spacing="2"
    fill="rgba(60,90,150,0.8)">chemeflow.netlify.app</text>
</svg>
